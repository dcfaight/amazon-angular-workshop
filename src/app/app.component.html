<div class="app-shell" [class.dark-theme]="(theme$ | async) === 'dark'">
  <header class="sticky-header">
    <a class="brand-link" routerLink="/" aria-label="Go to home page">
      <h1>Amazon Angular Workshop</h1>
    </a>
    <div class="header-controls">
      <button type="button" class="theme-toggle" (click)="toggleTheme()">
        Toggle Theme
      </button>

      <ng-container *ngIf="currentUser$ | async as user">
        <div class="auth-controls">
          <span class="current-user">{{ user.name }}</span>
          <span [class]="getRoleBadgeClass(user)">{{ getPrimaryRole(user) }}</span>
          <a routerLink="/orders" class="orders-link">Orders</a>
          <a *ngIf="user.roles?.includes('admin')" routerLink="/admin" class="admin-link">Admin</a>
          <button type="button" (click)="signOut()">Sign Out</button>
        </div>

        <span class="cart-container" (click)="toggleCart()">
          <span class="cart-icon">🛒</span>
          <span class="cart-count">{{ cartCount$ | async }}</span>
        </span>
      </ng-container>
    </div>
  </header>
  <main>
    <router-outlet></router-outlet>
  </main>

<!-- Cart summary overlay (place at bottom of app.component.html) -->
  <div
    class="cart-overlay"
    *ngIf="cartOpen$ | async"
    (click)="toggleCart()"
  >
    <div
      class="cart-summary"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-label="Shopping cart summary"
    >
      <h3>Your Shopping Cart ({{ (cartItems$ | async)?.length ?? 0 }})</h3>
      <ul *ngIf="(cartItems$ | async)?.length; else emptyCart">
        <li *ngFor="let item of cartItems$ | async">
          <img [src]="item.imageUrl" width="40" /> {{ item.title }} — ${{ item.price }}
        </li>
      </ul>
      <ng-template #emptyCart>
        <div>Your cart is empty.</div>
      </ng-template>
      <div class="cart-actions">
        <a routerLink="/checkout" (click)="$event.stopPropagation(); toggleCart()">Checkout</a>
        <button (click)="toggleCart()">Close</button>
      </div>
    </div>
  </div>

  <div class="toast" *ngIf="toast$ | async as toast">
    {{ toast }}
  </div>
</div>
