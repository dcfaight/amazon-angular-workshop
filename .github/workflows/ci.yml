name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: 95

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build app
        run: npm run build -- --configuration=development

      - name: Enforce coverage threshold
        run: |
          node -e "const fs=require('fs');const html=fs.readFileSync('coverage/amazon-angular-workshop/index.html','utf8');const min=Number(process.env.COVERAGE_MIN||95);const find=(label)=>{const re=new RegExp('<span class=\\\"strong\\\">\\\\s*([0-9]+(?:\\\\.[0-9]+)?)%\\\\s*</span>\\\\s*<span class=\\\"quiet\\\">'+label+'</span>');const m=html.match(re);if(!m) throw new Error('Missing coverage metric: '+label);return Number(m[1]);};const metrics={Statements:find('Statements'),Branches:find('Branches'),Functions:find('Functions'),Lines:find('Lines')};console.log('Coverage metrics:',metrics);const failed=Object.entries(metrics).filter(([,v])=>v<min);if(failed.length){console.error('Coverage threshold check failed. Minimum: '+min+'%');for(const [k,v] of failed){console.error(k+': '+v+'%');}process.exit(1);}"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/amazon-angular-workshop/
          if-no-files-found: warn
